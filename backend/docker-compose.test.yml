version: '3.8'

services:
  test-db:
    image: postgres:15-alpine
    container_name: cadence-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: cadence_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test_user -d cadence_test']
      interval: 2s
      timeout: 5s
      retries: 10
